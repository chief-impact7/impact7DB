name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]

# 배포는 통합 호스팅(impact7-hosting)이 전담한다. 각 앱은 빌드·자체 배포를 하지 않고
# 통합 재빌드만 트리거한다. 자체 site는 impact7-app/{path}로 redirect만 하므로
# 수동 `firebase deploy`로 자체 site만 갱신돼 통합과 불일치하던 함정이 구조적으로 사라진다.
jobs:
  trigger-unified:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger unified hosting deploy
        # --fail-with-body: HTTP 4xx/5xx면 비0 종료로 job 실패(토큰 만료·권한오류가 초록으로 묻히던 false positive 차단, H-07).
        # 통합 빌드 자체의 성공/취소는 impact7-hosting 워크플로가 소유하므로 여기선 dispatch 수락만 보장한다.
        run: |
          curl --fail-with-body -sS -X POST https://api.github.com/repos/chief-impact7/impact7-hosting/dispatches \
            -H "Authorization: Bearer ${{ secrets.HOSTING_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"event_type":"deploy-unified"}'
