name: Update @impact7/shared

on:
  repository_dispatch:
    types: [update-shared]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # master는 required status check(validate) 보호라 GITHUB_TOKEN 직push가 GH006으로 막힌다.
      # admin PAT(UPDATE_SHARED_PUSH_TOKEN)으로 checkout해 push가 admin bypass를 타게 한다.
      # 토큰은 gh auth 토큰 재사용 — 만료 시: gh secret set UPDATE_SHARED_PUSH_TOKEN --repo chief-impact7/impact7DB --body "$(gh auth token)"
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.UPDATE_SHARED_PUSH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Bump @impact7/shared (root + functions + functions-shared)
        # 단순 npm install은 git 태그 spec 변경 시 lock의 resolved 커밋을 갱신하지 않음 — 명시적 spec 설치로 강제.
        # 루트만 올리면 functions가 구버전에 고정돼 drift가 발생했음(M-06/N-03) → 세 패키지 모두 갱신.
        run: |
          SPEC="@impact7/shared@github:chief-impact7/impact7-shared#${{ github.event.client_payload.version }}"
          npm install "$SPEC"
          (cd functions && npm install "$SPEC")
          (cd functions-shared && npm install "$SPEC")

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json \
            functions/package.json functions/package-lock.json \
            functions-shared/package.json functions-shared/package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: @impact7/shared ${{ github.event.client_payload.version }} (root+functions+shared)"
            git push
          fi
