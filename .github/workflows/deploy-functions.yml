name: Deploy Functions

# functions 코드가 바뀐 push에서만 자동 배포한다(매 push 아님). 수동 firebase deploy
# 기억 의존을 없앤다. workflow_dispatch는 권한·동작 테스트용 수동 트리거.
on:
  push:
    branches: [master]
    paths:
      - 'functions-shared/**'
      - 'functions/**'
  # PR에서는 validate만 실행(deploy는 push 전용) — branch protection 필수 체크로 사용(G09).
  # 경로 필터 없이 모든 master PR에서 돌려, 필수 체크가 항상 보고되게 한다.
  pull_request:
    branches: [master]
  workflow_dispatch:

# dorny/paths-filter@v3가 아직 Node20 런타임이라 Node24로 강제(2026-06-16 GitHub 기본 전환 시 제거 가능)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 배포 전 검증 게이트 — lint/unit/integration/rules가 모두 통과해야 deploy가 돈다(H-06).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - run: npm i -g firebase-tools

      # lockfile을 추적하므로 npm ci로 결정적 설치(M-07).
      - name: Install deps (npm ci)
        run: |
          npm ci
          (cd functions && npm ci)
          (cd functions-shared && npm ci)

      - name: Check @impact7/shared version parity (root+functions+shared)
        run: npm run check:shared

      - name: Lint (functions)
        run: (cd functions && npm run lint)

      - name: Unit tests (functions-shared)
        run: (cd functions-shared && npm test)

      # package.json test = unit + integration(emulators:exec 자체 래핑) — 로컬 단독 실행과 동일 계약(F-04)
      - name: Unit + Integration tests (functions)
        run: (cd functions && npm test)

      - name: Firestore rules tests (root, emulator)
        run: npm run test:rules

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'   # PR은 검증만, 배포는 push/dispatch에서만
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed codebase
        id: f
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared: 'functions-shared/**'
            leave: 'functions/**'

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm i -g firebase-tools

      - name: Write service account
        run: |
          cat > "$HOME/sa.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          JSON

      # lockfile 추적으로 npm ci 사용 — 같은 SHA는 동일 의존성 트리로 배포(M-07).
      - name: Deploy functions:shared
        if: github.event_name == 'workflow_dispatch' || steps.f.outputs.shared == 'true'
        run: |
          (cd functions-shared && npm ci)
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          firebase deploy --only functions:shared --project impact7db --non-interactive

      # functions(leave-request) 변경 시 배포
      - name: Deploy functions:leave-request
        if: steps.f.outputs.leave == 'true'
        run: |
          (cd functions && npm ci)
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          firebase deploy --only functions:leave-request --project impact7db --non-interactive --force

      # v2 함수 재배포가 일부 서비스의 public invoker(allUsers)를 무작위로 리셋해, onCall이
      # "Empty Authorization header"로 거부되며 클라엔 functions/internal이 뜨는 이슈 대응.
      # 대상은 전 서비스가 아니라 index.js에서 추출한 onCall/onRequest allowlist만 —
      # 같은 region에 내부 전용 서비스가 생겨도 자동으로 공개되지 않게 한다(F-03).
      # onSchedule/onDocument* 트리거는 매칭되지 않아 제외된다.
      - name: Restore public invoker on callable services
        if: steps.f.outputs.shared == 'true' || steps.f.outputs.leave == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud auth activate-service-account --key-file="$HOME/sa.json" --quiet
          CALLABLES=$(grep -hoE '^export const [A-Za-z0-9_]+ = (onCall|onRequest)\(' functions-shared/index.js functions/index.js || true)
          CALLABLES=$(echo "$CALLABLES" | awk 'NF {print tolower($3)}')
          # 추출 수 ≠ onCall/onRequest 토큰 수면 멀티라인/래퍼 선언이 allowlist에서 조용히 빠진 것 — 하드 실패
          COUNT=$(echo "$CALLABLES" | grep -c . || true)
          TOKENS=$(grep -hoE '\b(onCall|onRequest)\(' functions-shared/index.js functions/index.js | wc -l)
          if [ "$COUNT" -eq 0 ] || [ "$COUNT" -ne "$TOKENS" ]; then
            echo "::error::callable allowlist 추출($COUNT)과 onCall/onRequest 토큰 수($TOKENS) 불일치 — 멀티라인·래퍼·re-export 선언 확인 필요"
            exit 1
          fi
          echo "allowlist ($COUNT): $CALLABLES"
          for fn in $CALLABLES; do
            gcloud run services add-iam-policy-binding "$fn" \
              --region asia-northeast3 --project impact7db \
              --member=allUsers --role=roles/run.invoker --quiet >/dev/null 2>&1 || echo "  (skip: $fn)"
          done
          echo "invoker 재부여 완료"
